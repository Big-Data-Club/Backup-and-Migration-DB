version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Neon Migration Stack
# Services: Airflow (webserver + scheduler + worker), PostgreSQL (metadata),
#           Redis (task queue), Dashboard (standalone Python server)
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # Migration-specific variables (override via .env)
    AIRFLOW_VAR_NEON_SOURCE_URL: ${NEON_SOURCE_URL:-postgresql://user:pass@source.neon.tech/postgres}
    AIRFLOW_VAR_NEON_TARGET_URLS: ${NEON_TARGET_URLS:-{"local":"postgresql://postgres:postgres@local-postgres:5432/postgres"}}
    AIRFLOW_VAR_NEON_EXCLUDE_DBS: '["template0","template1","postgres"]'
    AIRFLOW_VAR_NEON_KNOWN_DBS: ${NEON_KNOWN_DBS:-[]}
    AIRFLOW_VAR_NEON_INCLUDE_DBS: ${NEON_INCLUDE_DBS:-[]}
    AIRFLOW_VAR_NEON_PARALLEL_WORKERS: '2'
    AIRFLOW_VAR_NEON_VERIFY_MIGRATION: 'true'
    AIRFLOW_VAR_SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    _PIP_ADDITIONAL_REQUIREMENTS: >
      psycopg2-binary
      pyyaml
      requests
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - /tmp/neon_dumps:/tmp/neon_dumps
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── Airflow Metadata DB ───────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "5433:5432"   # Avoid conflict with local postgres

  # ── Local Target PostgreSQL (migration destination) ───────────────────────
  local-postgres:
    image: postgres:16
    container_name: local_target_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - local_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5

  # ── Redis (Celery broker) ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: airflow_redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s

  # ── Airflow Init ─────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow db upgrade
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        echo "Airflow initialized"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    restart: "no"

  # ── Airflow Webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Celery Worker ─────────────────────────────────────────────────
  airflow-worker:
    <<: *airflow-common
    container_name: airflow_worker
    command: celery worker
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" -t 10'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Flower (Celery monitoring) ────────────────────────────────────
  flower:
    <<: *airflow-common
    container_name: airflow_flower
    command: celery flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Migration Dashboard (standalone HTTP server) ──────────────────────────
  dashboard:
    image: python:3.12-slim
    container_name: migration_dashboard
    volumes:
      - ./dashboard:/app
      - ./migration_state.json:/app/migration_state.json:ro
      - ./logs:/app/logs:ro
    working_dir: /app
    command: >
      sh -c "pip install -q flask flask-cors &&
             python dashboard_server.py"
    ports:
      - "8081:8081"
    environment:
      AIRFLOW_BASE_URL: "http://airflow-webserver:8080"
      AIRFLOW_USER: admin
      AIRFLOW_PASS: admin
    depends_on:
      - airflow-webserver

volumes:
  postgres_data:
  local_pg_data: